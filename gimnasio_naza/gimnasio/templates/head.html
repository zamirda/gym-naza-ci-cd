  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
  /* ==================== SISTEMA DE VARIABLES NEON GYM ==================== */
  :root {
    --bg-body: #050505;
    --primary-blue: #ffd700;
    --primary-light: rgba(255, 215, 0, 0.15);
    --text-dark: #ffffff;
    --text-muted: #a0a0a0;
    --border-color: rgba(255, 255, 255, 0.1);
    
    /* Variables de tamaño de la barra lateral vitales para el Toggle */
    --sidebar-width: 260px; 
    --sidebar-collapsed-width: 80px; 
    --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  body.theme-strong {
    --bg-white: rgba(15, 15, 15, 0.7);
    --bg-surface: rgba(20, 20, 20, 0.75);
    --bg-surface-hover: rgba(255, 215, 0, 0.1);
    --border-radius-card: 6px;
    --border-radius-btn: 4px;
    --shadow-main: 0 8px 32px rgba(0, 0, 0, 0.6);
    --shadow-hover: 0 0 20px rgba(255, 215, 0, 0.3);
    --font-heading-weight: 800;
    --card-border: 1px solid rgba(255, 215, 0, 0.2);
    --card-backdrop: blur(15px);
  }

  body.theme-soft {
    --bg-white: rgba(15, 15, 15, 0.7);
    --bg-surface: rgba(25, 25, 25, 0.7);
    --bg-surface-hover: rgba(255, 215, 0, 0.08);
    --border-radius-card: 20px;
    --border-radius-btn: 30px;
    --shadow-main: 0 10px 30px rgba(0, 0, 0, 0.5);
    --shadow-hover: 0 10px 40px rgba(0, 0, 0, 0.7), 0 0 25px rgba(255, 215, 0, 0.2);
    --font-heading-weight: 600;
    --card-border: 1px solid rgba(255, 215, 0, 0.15);
    --card-backdrop: blur(18px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

  /* ==================== 1. FONDO GLOBAL ==================== */
  body { 
    background-image: 
      linear-gradient(to right, rgba(5,5,5,0.92) 0%, rgba(5,5,5,0.75) 100%),
      url("/static/imagen/imagen_login.jpg") !important;
    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
    color: var(--text-dark); 
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; 
  }

  /* ==================== 2. CONTENEDORES PRINCIPALES ==================== */
  .main-container {
    display: flex; flex-grow: 1; overflow: hidden;
    margin-top: 70px; height: calc(100vh - 70px);
  }

  .content-area {
    background: transparent !important; padding: 30px;
    flex-grow: 1; overflow-y: auto; 
  }

  @media (max-width:768px){

      .content-area{

          padding:15px;

      }

  }

  .topbar {
    position: fixed; top: 0; left: 0; width: 100%; height: 70px;
    background-color: rgba(10, 10, 10, 0.8) !important;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    z-index: 1000;
  }

  /* ==================== 3. BARRA LATERAL (SIDEBAR)  ==================== */
  .sidebar {
    width: var(--sidebar-width); min-width: var(--sidebar-width);
    background-color: var(--bg-white) !important;
    backdrop-filter: var(--card-backdrop); -webkit-backdrop-filter: var(--card-backdrop);
    border-right: 1px solid rgba(255, 215, 0, 0.15) !important; /* Borde sutil dorado */
    box-shadow: 5px 0 25px rgba(0,0,0,0.5); /* Sombra hacia el contenido */
    transition: var(--transition);
    overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; z-index: 100;
  }
  
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--primary-blue); border-radius: 10px; }

  /* Perfil de Usuario*/
  .user-panel { 
    text-align: center; padding: 30px 10px 20px; 
    border-bottom: 1px solid var(--border-color); 
    transition: var(--transition); white-space: nowrap; 
  }
  
  .profile-img-wrapper img { 
    width: 75px; height: 75px; border-radius: 50%; 
    border: 2px solid var(--primary-blue); 
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    object-fit: cover;
  }
  
  .profile-img-wrapper img:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    border-color: #fff;
  }

  .user-panel h3 { font-size: 15px; font-weight: 700; color: #fff; margin-top: 15px; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;}
  
  /* Diagonal  */
  .badge-plan {
    background: var(--primary-blue);
    padding: 4px 18px;
    display: inline-block;
    transform: skewX(-15deg);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    transition: var(--transition);
  }
  .badge-plan:hover { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); background: #fff; }
  .badge-plan a { transform: skewX(15deg); display: block; color: #000; font-size: 11px; font-weight: 900; text-decoration: none; text-transform: uppercase; letter-spacing: 1px;}

  /* ==================== 4. MENÚ DE NAVEGACIÓN  ==================== */
  .nav-menu { padding: 20px 12px; list-style: none; flex-grow: 1; margin: 0; }
  .nav-menu li { margin-bottom: 6px; }
  
  .nav-menu li > a {
    position: relative;
    display: flex; align-items: center; padding: 12px 15px;
    color: var(--text-muted); font-size: 13.5px; font-weight: 600;
    border-radius: var(--border-radius-btn); text-decoration: none;
    transition: var(--transition); white-space: nowrap; overflow: hidden;
    border-left: 3px solid transparent;
    z-index: 1;
  }

  /* Fondo de barrido Hover */
  .nav-menu li > a::before {
    content: ''; position: absolute; left: 0; top: 0; width: 0%; height: 100%;
    background: linear-gradient(90deg, rgba(255,215,0,0.15) 0%, transparent 100%);
    transition: var(--transition); z-index: -1;
  }

  .nav-menu li > a:hover::before, .nav-menu li.active > a::before { width: 100%; }

  .nav-menu li > a:hover {
    color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3);
    border-left: 3px solid var(--primary-blue);
    transform: translateX(6px); /* Efecto de empuje lateral */
  }

  .nav-menu li.active > a {
    color: var(--primary-blue); font-weight: 700;
    border-left: 3px solid var(--primary-blue);
    background: rgba(255,215,0,0.05);
    box-shadow: inset 15px 0 20px -15px rgba(255, 215, 0, 0.4);
  }

  /* Íconos controlados pop-out */
  .icon-circle {
    width: 34px; height: 34px; min-width: 34px; 
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.4); color: var(--text-muted);
    margin-right: 15px; transition: var(--transition);
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .icon-circle i { font-size: 15px !important; transition: var(--transition); }

  /* Animación del ícono al pasar el mouse */
  .nav-menu li > a:hover .icon-circle {
    background: var(--primary-blue); color: #000;
    box-shadow: 0 0 15px var(--primary-blue);
    border-color: var(--primary-blue);
    transform: scale(1.1) rotate(-8deg); /* Pequeña rotación rebelde */
  }

  .nav-menu li.active > a .icon-circle {
    background: var(--primary-blue); color: #000;
    box-shadow: 0 0 20px var(--primary-blue);
    border-color: #fff;
  }

  /* ==================== 5.ESTADO CONTRAÍDO ==================== */
  body.sidebar-collapsed .sidebar {
    width: var(--sidebar-collapsed-width) !important;
    min-width: var(--sidebar-collapsed-width) !important;
  }

  body.sidebar-collapsed .sidebar span,
  body.sidebar-collapsed .sidebar h3,
  body.sidebar-collapsed .badge-plan { display: none; }

  body.sidebar-collapsed .nav-menu li > a { padding: 12px 10px; justify-content: center; }
  body.sidebar-collapsed .icon-circle { margin-right: 0; }
  
  /* Ajustar la imagen cuando se contrae */
  body.sidebar-collapsed .profile-img-wrapper img { width: 45px; height: 45px; }
  body.sidebar-collapsed .user-panel { padding: 20px 5px; }

  /* ==================== 6. RESPONSIVO PARA MÓVILES ==================== */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -100%; height: calc(100vh - 70px); top: 70px; }
    .sidebar.mobile-active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
    .topbar-left { width: auto; }
  }

  @media (max-width:991px){

      .main-container{
          display:block;
          margin-top:70px;
          height:auto;
      }

      .content-area{
          width:100%;
          padding:15px;
      }

  }
</style>

  <link rel="stylesheet" href="{% static '/assets/css/demo.css' %}" />

  <link rel="stylesheet" href="{% static '/assets/vendor/libs/apex-charts/apex-charts.css' %}" />

  <script src="{% static 'js/helpers.js' %}"></script>
  <script src="{% static '/assets/js/config.js' %}"></script>
  <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>
  <script src="{% static 'html5-qrcode-master/minified/html5-qrcode.min.js' %}"></script>
  <script src='{% static "js/all.min.js" %}'></script>
