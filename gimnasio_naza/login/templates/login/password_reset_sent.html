{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado | Gimnasio Nazareth</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="container">
    <div class="form-section">
        
        <div class="status-icon-container">
            <div class="pulse-ring"></div>
            <div class="icon-header">
                <i class="ri-mail-send-line"></i>
            </div>
        </div>

        <h2>¡CORREO ENVIADO!</h2>
        <h1>REVISA TU BANDEJA</h1>

        <div class="info-box-custom">
            <p><i class="ri-information-line"></i> <strong>¿NO RECIBISTE NADA?</strong></p>
            <ul>
                <li>Revisa tu carpeta de <strong>SPAM</strong>.</li>
                <li>Verifica que el correo sea el correcto.</li>
                <li>Espera un momento antes de reintentar.</li>
            </ul>
        </div>

        <div class="login-text">
            <p>¿Ya recordaste tu contraseña?</p>
            <a href="{% url 'login:login' %}" class="back-link">
                <i class="ri-arrow-left-line"></i> VOLVER AL LOGIN
            </a>
        </div>
    </div>
</div>

</body>
</html>
